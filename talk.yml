      import java.time.Instant;

      public class Demo {
        public static void main(String[] args) {
          System.out.println("JUGT @ " + Instant.now());
        }
      }
    caption: "Code highlighting is handled automatically"

  - type: "code"
    title: "Switch Pattern Matching"
    language: "java"
    code: |
      public class SwitchDemo {

        static String describe(Object o) {
          return switch (o) {
            case null -> "null";
            case Integer i -> "int=" + i;
            case String s -> "str=" + s.toUpperCase();
            default -> "object=" + o.getClass().getSimpleName();
          };
        }

        public static void main(String[] args) {
          System.out.println(describe(42));
          System.out.println(describe("jugt"));
        }
      }

