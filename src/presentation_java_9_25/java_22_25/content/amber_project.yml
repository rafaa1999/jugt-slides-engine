slides:
  - type: "section"
    title: "Project Amber"
    subtitle: "Language Evolution — Java's Modern Transformation"

  - type: "two-column"
    title: "What is Project Amber?"
    left:
      heading: "The Mission"
      bullets:
        - "Reduce Java's 'ceremony' and boilerplate"
        - "Make code more expressive and readable"
        - "Bring modern language features to Java"
    right:
      heading: "Key Deliverables"
      bullets:
        - "Pattern matching (instanceof, switch)"
        - "Records and Sealed classes"
        - "Text blocks and String templates"
        - "Unnamed variables and patterns"

  - type: "two-column"
    title: "Language Features Timeline"
    left:
      heading: "Completed (Java 14-21)"
      bullets:
        - "Switch expressions (Java 14)"
        - "Records (Java 16)"
        - "Sealed classes (Java 17)"
        - "Pattern matching for instanceof (Java 16)"
        - "Pattern matching for switch (Java 21)"
        - "Record patterns (Java 21)"
    right:
      heading: "New in Java 22-24"
      bullets:
        - "Unnamed variables & patterns (Java 22)"
        - "Flexible constructor bodies (Java 24)"
        - "Markdown Javadoc (Java 23)"
        - "Module imports (Java 23)"
        - "Stream gatherers (Java 24)"

  - type: "code"
    title: "String Templates: A Historical Note"
    language: "java"
    code: |
      // String Templates were previewed in Java 21-22
      // but WITHDRAWN in Java 23 due to design concerns

      // The original idea:
      String message = STR."Hello \{name}, welcome!";

      // Why it was withdrawn:
      // 1. Security concerns with template injection
      // 2. Complexity of the processor framework
      // 3. Better alternatives being explored

      // For now, use traditional methods:
      String message = "Hello " + name + ", welcome!";
      // Or use MessageFormat or String.formatted()
    caption: "String Templates were withdrawn — the Java team is exploring better approaches."

  - type: "two-column"
    title: "What Project Amber Achieved"
    left:
      heading: "Less Boilerplate"
      bullets:
        - "Records replace verbose POJOs"
        - "Switch expressions remove fall-through"
        - "Pattern matching eliminates casting"
        - "Unnamed variables clean up unused vars"
    right:
      heading: "Better Readability"
      bullets:
        - "Code reads like prose"
        - "Intent is clear from syntax"
        - "Less noise, more signal"
        - "Safer code with less effort"

  - type: "code"
    title: "The Modern Java Way"
    language: "java"
    code: |
      // Modern Java is clean and expressive

      // Records: Data classes in one line
      record User(String name, int age) {}

      // Sealed interfaces: Controlled hierarchies
      sealed interface Shape permits Circle, Rectangle {}

      // Pattern matching: Type checking made simple
      String describe(Object obj) {
          return switch (obj) {
              case String s -> "Text: " + s;
              case Integer i -> "Number: " + i;
              case null -> "Nothing";
              default -> "Unknown";
          };
      }

      // Unnamed patterns: Ignore what you don't need
      if (obj instanceof Point(var x, var _)) {
          System.out.println("X coordinate: " + x);
      }
    caption: "Project Amber made Java more expressive while maintaining backward compatibility."