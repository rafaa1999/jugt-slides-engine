slides:
  - type: "section"
    title: "Project Amber"
    subtitle: "Cleaning Up the Java Language"

  - type: "two-column"
    title: "Why Project Amber?"
    left:
        heading: "The 'Old' Java"
        bullets:
            - "Code was too long and repetitive"
            - "Like writing a 10-page contract for a simple task"
    right:
        heading: "The Goal"
        bullets:
            - "Remove 'Boilerplate' (useless code)"
            - "Make Java as clean as modern languages"

  - type: "two-column"
    title: "The String Problem"
    left:
        heading: "The '+' Nightmare"
        bullets:
            - "Mixing text and variables with '+' is messy"
            - "Hard to read and easy to break"
    right:
        heading: "The Maintenance Cost"
        bullets:
            - "Complex text takes too much time to write"
            - "Small errors are hard to find"


  - type: "code-compare"
    title: "Before vs After: String Templates"
    left:
      title: "Concatenation"
      language: "java"
      code: |
        // Manual concatenation
        String message = "Hello " + name + ", welcome!";
        // Multiple parts → less readable and error-prone
    right:
      title: "String Templates"
      language: "java"
      code: |
        // STR is a template processor
        // \{name} injects the variable directly into the string
        String message = STR."Hello \{name}, welcome!";
        // Cleaner, safer, and easier to maintain


