slides:
  - type: "section"
    title: "Foreign Function & Memory API"
    subtitle: "Java 22 — Call C Code from Java (No JNI!)"

  - type: "two-column"
    title: "The Old Way: JNI"
    left:
      heading: "What is JNI?"
      bullets:
        - "Java Native Interface"
        - "Lets Java call C/C++ code"
        - "Used for 25+ years"
    right:
      heading: "Why It's Painful"
      bullets:
        - "Write C code by hand"
        - "Compile for each platform"
        - "Easy to crash the JVM"
        - "Complex setup"

  - type: "code"
    title: "JNI: Too Many Steps"
    language: "java"
    code: |
      // Step 1: Declare native method
      public class MathLib {
          static { System.loadLibrary("math"); }
          public native int add(int a, int b);
      }

      // Step 2: Generate header
      // $ javac -h . MathLib.java

      // Step 3: Write C code
      /*
      #include <jni.h>
      JNIEXPORT jint JNICALL Java_MathLib_add
        (JNIEnv *env, jobject obj, jint a, jint b) {
          return a + b;
      }
      */

      // Step 4: Compile C for Windows, Mac, Linux...
      // Step 5: Package native libraries
      // Step 6: Debug memory crashes...
    caption: "6+ steps just to add two numbers? No thanks!"

  - type: "code"
    title: "New Way: Foreign Function API"
    language: "java"
    code: |
      import java.lang.foreign.*;

      // Call C's strlen function directly!
      public class Example {
          public static void main(String[] args) throws Throwable {
              // Get the native linker
              Linker linker = Linker.nativeLinker();

              // Find strlen in C library
              MethodHandle strlen = linker.downcallHandle(
                  linker.defaultLookup().find("strlen").orElseThrow(),
                  FunctionDescriptor.of(
                      ValueLayout.JAVA_LONG,
                      ValueLayout.ADDRESS
                  )
              );

              // Call it!
              try (Arena arena = Arena.ofConfined()) {
                  MemorySegment str = arena.allocateFrom("Hello!");
                  long len = (long) strlen.invoke(str);
                  System.out.println("Length: " + len);  // 6
              }
          }
      }
    caption: "No C code, no compilation — just Java!"

