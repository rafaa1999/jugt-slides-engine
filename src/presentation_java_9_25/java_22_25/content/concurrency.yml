slides:
  - type: "section"
    title: "The Concurrency Challenge"
    subtitle: "Why Traditional Threads are Struggling"

  - type: "two-column"
    title: "The Problem: 'Heavy' Threads"
    left:
      heading: "High Resource Cost"
      bullets:
        - "Each OS thread is like a massive truck"
        - "Consumes a lot of memory (MBs) just to start"
        - "Slow to create and destroy"
    right:
      heading: "Limited Scalability"
      bullets:
        - "Your computer can only park a few thousand trucks"
        - "If you need millions, the system crashes"
        - "Wastes power while waiting for tasks"

  - type: "two-column"
    title: "The Complexity Trap"
    left:
      heading: "Thread Pools"
      bullets:
        - "Managing pools is like complex logistics"
        - "Hard to tune the right size"
    right:
      heading: "The Result"
      bullets:
        - "Application becomes slow and unstable"
        - "High costs for Cloud servers"

  - type: "code-compare"
    title: "Platform vs Virtual Threads"
    left:
      title: "Platform Threads (Limited)"
      language: "java"
      code: |
        for (int i = 0; i < 1000; i++) {
            new Thread(() -> {
                // Costs ~1MB of RAM
            }).start();
        }
    right:
      title: "Virtual Threads"
      language: "java"
      code: |
        for (int i = 0; i < 1000; i++) {
            Thread.startVirtualThread(() -> {
                // Costs only a few bytes
            });
        }
    caption: "Platform threads are heavy OS resources, while virtual threads are lightweight and managed by the JVM."

  - type: "two-column"
    title: "How it Works: The Call Center Analogy"
    subtitle: "Tasks vs. Workers"
    left:
      heading: "The 'Tasks' (Virtual Threads)"
      bullets:
        - "Like thousands of incoming calls"
        - "Very light and easy to create"
        - "They wait for an operator to answer"
    right:
      heading: "The 'Workers' (OS Threads)"
      bullets:
        - "Like a few real operators (Carrier Threads)"
        - "They are expensive and limited"
        - "They switch between calls instantly"

  - type: "two-column"
    title: "How it Works: Smart Efficiency"
    left:
      heading: "Traditional Waiting"
      bullets:
        - "Old way: Operator stays on the line while a customer waits"
        - "Result: The operator is wasted"
    right:
      heading: "Virtual Thread Way"
      bullets:
        - "New way: Operator hangs up and answers another call"
        - "Result: No operator is ever idle"

  - type: "two-column"
    title: "Virtual Threads: Key Benefits"
    subtitle: "Scalability & Simplicity"
    left:
      heading: "Massive Scalability"
      bullets:
        - "Handle millions of concurrent requests"
        - "Better resource usage (lower RAM per thread)"
    right:
      heading: "Simple Concurrency"
      bullets:
        - "Write simple blocking code that scales"
        - "Easier debugging and maintenance"

  - type: "two-column"
    title: "The Pinning Problem: Stuck Workers"
    subtitle: "Understanding Synchronization issues"
    left:
      heading: "What is Pinning?"
      bullets:
        - "A virtual thread gets 'stuck' to its OS thread"
        - "Like a worker's chair being bolted to the floor"
    right:
      heading: "The Blocking Cause"
      bullets:
        - "Happens when using 'synchronized' blocks"
        - "The OS thread cannot leave to help others"

  - type: "two-column"
    title: "Pinning: Impact & Waste"
    left:
      heading: "Reduced Scalability"
      bullets:
        - "One blocked OS thread = one less worker"
        - "If many threads are pinned, the system stops"
    right:
      heading: "The Resource Waste"
      bullets:
        - "CPU sits idle while the thread is stuck"
        - "Defeats the purpose of Virtual Threads"

  - type: "code-compare"
    title: "Synchronization: Before vs After"
    left:
      title: "Before (Pinning)"
      language: "java"
      code: |
        synchronized (lock) {
            // Virtual thread is pinned
            // Blocks carrier thread
        }
    right:
      title: "After (Java 24+)"
      language: "java"
      code: |
        synchronized (lock) {
            // No more pinning!
            // JVM reschedules efficiently
        }
    caption: "Modern Java (24) solves the pinning issue, keeping virtual threads scalable even inside synchronized blocks."

  - type: "two-column"
    title: "Real Use Cases: Web & Cloud"
    subtitle: "Scenario 1: High-Traffic Servers"
    left:
      heading: "The Problem"
      bullets:
        - "Like a restaurant receiving 10,000 orders"
        - "Traditional servers run out of waiters"
    right:
      heading: "The Virtual Solution"
      bullets:
        - "Virtual threads act like digital delivery"
        - "Orders processed without waiting for a table"

  - type: "two-column"
    title: "Real Use Cases: Efficiency"
    subtitle: "Scenario 2: Microservices"
    left:
      heading: "Microservice APIs"
      bullets:
        - "Perfect for apps talking to many databases"
        - "Keeps the system fast under heavy load"
    right:
      heading: "Cost Efficiency"
      bullets:
        - "Use smaller, cheaper servers in the cloud"
        - "Do more work with less hardware"

  - type: "code"
    title: "Practical Example: Concurrent API Calls"
    language: "java"
    code: |
      try (var executor = Executors.newVirtualThreadPerTaskExecutor()) {
          executor.submit(() -> fetchDataFromDB());
          executor.submit(() -> callExternalAPI());
      }
    caption: "Virtual threads make high-concurrency code easy and cost-effective for modern architectures."