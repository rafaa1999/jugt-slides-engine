slides:
  - type: "section"
    title: "Stream Gatherers"
    subtitle: "Java 24 — Create Your Own Stream Operations"

  - type: "two-column"
    title: "The Problem"
    left:
      heading: "Streams Are Limited"
      bullets:
        - "You get map, filter, reduce..."
        - "But what if you want sliding windows?"
        - "Or batching items into groups?"
    right:
      heading: "Before Gatherers"
      bullets:
        - "Write complex workarounds"
        - "Use external libraries"
        - "Hard to reuse the logic"

  - type: "code"
    title: "What You Wanted: Sliding Windows"
    language: "java"
    code: |
      // Input:  [a, b, c, d, e]
      // Output: [[a,b,c], [b,c,d], [c,d,e]]
      //         ^^^       ^^^       ^^^
      //         window 1  window 2  window 3

      // Before: ugly workaround
      List<List<String>> windows = new ArrayList<>();
      for (int i = 0; i <= list.size() - 3; i++) {
          windows.add(list.subList(i, i + 3));
      }
    caption: "Creating custom stream operations was painful."

  - type: "code"
    title: "After: Stream Gatherers"
    language: "java"
    code: |
      import static java.util.stream.Gatherers.*;

      // Java 24: Built-in sliding window!
      list.stream()
          .gather(windowSliding(3))
          .forEach(System.out::println);

      // Output:
      // [a, b, c]
      // [b, c, d]
      // [c, d, e]
    caption: "Clean, readable, and built into Java 24."

  - type: "code"
    title: "Built-in Gatherers"
    language: "java"
    code: |
      import static java.util.stream.Gatherers.*;

      // Fixed-size windows (batches)
      list.stream()
          .gather(windowFixed(3))
          .forEach(System.out::println);
      // [[a, b, c], [d, e]]

      // Sliding windows
      list.stream()
          .gather(windowSliding(3))
          .forEach(System.out::println);
      // [[a, b, c], [b, c, d], [c, d, e]]
