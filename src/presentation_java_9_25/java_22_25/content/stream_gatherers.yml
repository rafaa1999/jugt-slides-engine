  - type: "two-column"
    title: "Key Benefits"
    left:
      heading: "Reusable"
      bullets:
        - "Define once, use everywhere"
        - "Share with your team"
        - "Compose with other operations"
    right:
      heading: "Simple"
      bullets:
        - "No intermediate collections"
        - "Lazy evaluation (like other stream ops)"
        - "Clean, readable code"