slides:
  - type: "section"
    title: "Virtual threads"
    subtitle: "From Java 19 Preview to Final in Java 21"
    bullets:
      - "Many virtual threads run on few OS threads"
      - "Scheduled by the JVM"
      - "Very cheap to create"
      - "Can scale to millions"
      - "Blocking I/O does not block the OS thread"
    note: "A virtual thread is a lightweight, JVM-managed thread that runs on top of platform threads (carrier threads)."

  - type: "code-compare"
    title: "Creating Platform thread VS creating Virtual thread"
    left:
      title: "Platform thread"
      language: "java"
      code: |
        // Option 1:
          new Thread(() -> {}).start();
        
        // Option 2: Factory builder
          Thread t = Thread.ofPlatform().start(runnable);
        
        // Option 3: With ExecutorService (one VT per task)
          ExecutorService es = Executors.newFixedThreadPool(10);
    right:
      title: "Virtual thread"
      language: "java"
      code: |
        // Option 1: Direct start
          Thread.startVirtualThread(() -> {});
        
        // Option 2: Factory builder
          Thread t = Thread.ofVirtual().start(runnable);
        
        // Option 3: With ExecutorService (one VT per task)
          ExecutorService es = Executors.newVirtualThreadPerTaskExecutor();