slides:
  - type: "section"
    title: "Pattern Matching"
    subtitle: "From Java 14 Preview to Final in Java 17"

  - type: "section"
    title: "Why Do We Need Pattern Matching?"
    subtitle: "The check-and-cast pattern was verbose and error-prone"
    bullets:
      - "instanceof check followed by an explicit cast: two lines doing one job"
      - "Compiler already knows the type after instanceof, so casting again is redundant"
      - "Long chains of if-else instanceof statements are hard to read and maintain"
    note: "Pattern matching lets the compiler do the cast automatically when the check succeeds"

  - type: "code-compare"
    title: "Old instanceof vs Pattern Matching"
    left:
      title: "Before Java 14: check + cast"
      language: "java"
      caption: "Redundant: you check the type, then cast to the same type, compiler already knows it"
      code: |
        if (obj instanceof String) {
            String s = (String) obj;
            System.out.println(s.length());
        }
    right:
      title: "Java 14 Preview: type pattern"
      language: "java"
      caption: "Binding variable s is declared and cast implicitly, scoped to the if block"
      code: |
        if (obj instanceof String s) {
            System.out.println(s.length());
        }

  - type: "section"
    title: "Java 14: First Preview (JEP 305)"
    subtitle: "Type patterns for instanceof"
    bullets:
      - "Introduced Type Patterns, e.g., instanceof String s"
      - "Compiler performs the cast implicitly on a successful check"
      - "Binding variable scoped strictly to the if block"
    note: "Preview in Java 14, requires --enable-preview flag"

  - type: "section"
    title: "Java 16: Final (JEP 394)"
    subtitle: "Pattern matching for instanceof becomes standard"
    bullets:
      - "Feature finalized after previews in Java 14 and 15"
      - "Pattern variables are no longer implicitly final (can be reassigned)"
    note: "Java 16 finalized the feature; no preview flag required"

  - type: "code-compare"
    title: "Java 14 vs Java 16: Pattern Variable Behavior"
    left:
      title: "Java 14: Pattern variable implicitly final"
      language: "java"
      caption: "Reassignment not allowed in preview"
      code: |
        if (obj instanceof String s) {
            // Error in Java 14:
            // cannot assign a value to final variable 's'
            s = s.toUpperCase();
        }
    right:
      title: "Java 16: Pattern variable is mutable"
      language: "java"
      caption: "Reassignment allowed after finalization"
      code: |
        if (obj instanceof String s) {
            // OK in Java 16
            s = s.toUpperCase();
            System.out.println(s);
        }

  - type: "section"
    title: "Java 17: New Preview"
    subtitle: "instanceof finalized (JEP 394) · switch patterns introduced (JEP 406)"
    bullets:
      - "New preview: Pattern Matching for switch, type patterns in case labels"
    note: "Java 17 introduced switch patterns as a preview feature; requires --enable-preview"

  - type: "code"
    title: "Java 17 Preview: Pattern Matching for switch"
    language: "java"
    compact: true
    code: |
      switch (obj) {
              case String s -> System.out.println("Text: " + s);
              case Integer i -> System.out.println("Number: " + i);
              default -> System.out.println("Unknown");
      }
    caption: "Introduces type patterns in switch (preview), simplifying instanceof + casting logic; advanced features like guards and null handling were added in later versions"

  - type: "two-column"
    title: "Pattern Matching: Java 14 Preview → Java 16 Final"
    left:
      heading: "Java 14–17 (Previews)"
      bullets:
        - "Java 14: instanceof type patterns"
        - "Java 15: second preview, refinement"
        - "Java 17: switch patterns preview"
        - "Opt-in with --enable-preview flag throughout preview versions"
    right:
      heading: "Java 16 (Final)"
      bullets:
        - "instanceof type patterns finalized, no flag required"
        - "Pattern variables are mutable and follow standard scoping rules"